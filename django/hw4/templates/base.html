<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Сотрудники{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f6f8; color: #222; }
    header { background: #2c3e50; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    header a { color: #fff; text-decoration: none; font-weight: bold; }
    nav a { margin-left: 16px; color: #ccc; text-decoration: none; font-size: 0.95rem; }
    nav a:hover { color: #fff; }
    main { max-width: 1100px; margin: 32px auto; padding: 0 16px; }
    footer { text-align: center; padding: 24px; font-size: 0.85rem; color: #888; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <header>
    <a href="{% url 'employees:index' %}">Workplace</a>
    <nav>
      <a href="{% url 'employees:index' %}">Главная</a>
      <a href="{% url 'employees:list' %}">Сотрудники</a>
      {% if user.is_authenticated %}
        <a href="{% url 'logout' %}">Выйти ({{ user.username }})</a>
      {% else %}
        <a href="{% url 'login' %}">Войти</a>
      {% endif %}
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>&copy; 2025 Workplace Project</footer>
</body>
</html>
