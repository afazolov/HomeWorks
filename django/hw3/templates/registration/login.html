{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
  <div style="max-width:400px;margin:0 auto;background:#fff;padding:32px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);">
    <h1 style="margin-bottom:24px;">Вход</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit"
              style="background:#2c3e50;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;margin-top:12px;">
        Войти
      </button>
    </form>
  </div>
{% endblock %}
