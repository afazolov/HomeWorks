{% extends "base.html" %}

{% block title %}Список сотрудников{% endblock %}

{% block content %}
  <h1 style="margin-bottom:24px;">Сотрудники</h1>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;">
    {% for employee in employees %}
      {% include "partials/employee_card.html" with employee=employee %}
    {% empty %}
      <p>Нет сотрудников.</p>
    {% endfor %}
  </div>
{% endblock %}
